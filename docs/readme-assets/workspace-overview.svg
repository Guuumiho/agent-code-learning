<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" fill="none">
  <rect width="1400" height="760" rx="20" fill="#F6F8FB"/>
  <rect x="24" y="24" width="1352" height="72" rx="14" fill="#FFFFFF" stroke="#D8E0EA"/>
  <text x="54" y="67" fill="#0F766E" font-size="26" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">顶部状态 + 设置入口</text>
  <text x="54" y="96" fill="#667085" font-size="16" font-family="Segoe UI, Microsoft YaHei, sans-serif">首次打开默认展开设置面板，选择 GitHub 或本地项目后开始分析</text>

  <rect x="24" y="120" width="320" height="604" rx="18" fill="#FFFFFF" stroke="#D8E0EA"/>
  <rect x="368" y="120" width="676" height="604" rx="18" fill="#FFFFFF" stroke="#D8E0EA"/>
  <rect x="1068" y="120" width="308" height="604" rx="18" fill="#FFFFFF" stroke="#D8E0EA"/>

  <text x="52" y="164" fill="#1F2933" font-size="28" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">左侧：项目地图</text>
  <text x="52" y="198" fill="#667085" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">快速知道目录、文件、函数分别在做什么</text>
  <rect x="52" y="232" width="260" height="444" rx="14" fill="#F8FBFD" stroke="#D8E0EA" stroke-dasharray="8 8"/>
  <text x="76" y="280" fill="#0F766E" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">极短说明</text>
  <text x="76" y="318" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">说明文档</text>
  <text x="76" y="354" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">主程序</text>
  <text x="76" y="390" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">核心agent逻辑</text>
  <text x="76" y="426" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">工具实现</text>
  <text x="76" y="462" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">上下文构建</text>
  <text x="76" y="516" fill="#0F766E" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">函数级入口</text>
  <text x="76" y="552" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">ContextBuilder.build_system_prompt</text>
  <text x="76" y="588" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">ContextBuilder.build_messages</text>

  <text x="396" y="164" fill="#1F2933" font-size="28" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">中间：源码现场</text>
  <text x="396" y="198" fill="#667085" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">关键函数、关键代码块、悬浮板都围绕真实源码展开</text>
  <rect x="396" y="232" width="620" height="444" rx="14" fill="#FFF8E6" stroke="#F3C969"/>
  <rect x="426" y="262" width="560" height="84" rx="10" fill="#FFFFFF" opacity=".7"/>
  <rect x="426" y="372" width="560" height="84" rx="10" fill="#FFFFFF" opacity=".7"/>
  <rect x="426" y="482" width="560" height="84" rx="10" fill="#FFFFFF" opacity=".7"/>
  <text x="448" y="316" fill="#7A4F00" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif">关键代码块标出，帮助快速锁定核心机制</text>
  <text x="448" y="426" fill="#7A4F00" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif">点击右侧流程或悬浮板节点，可直接跳到对应代码位置</text>
  <text x="448" y="536" fill="#7A4F00" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif">悬浮板解释“这段代码在当前 agent 旅程里扮演什么角色”</text>

  <text x="1096" y="164" fill="#1F2933" font-size="28" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">右侧：旅程视角</text>
  <text x="1096" y="198" fill="#667085" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">先理解 agent 场景，再回到源码看证据</text>
  <rect x="1096" y="232" width="252" height="56" rx="12" fill="#DFF3F0"/>
  <text x="1120" y="266" fill="#0F766E" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">简单问答 / 上下文 / 工具调用</text>
  <rect x="1096" y="314" width="252" height="112" rx="14" fill="#FFFFFF" stroke="#D8E0EA"/>
  <rect x="1096" y="448" width="252" height="112" rx="14" fill="#FFFFFF" stroke="#D8E0EA"/>
  <rect x="1096" y="582" width="252" height="92" rx="14" fill="#FFFFFF" stroke="#D8E0EA"/>
  <text x="1118" y="354" fill="#0F766E" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">接收用户消息</text>
  <text x="1118" y="388" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">用户消息如何进入 agent</text>
  <text x="1118" y="488" fill="#0F766E" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">构建上下文</text>
  <text x="1118" y="522" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">哪些信息会暴露给 LLM</text>
  <text x="1118" y="618" fill="#0F766E" font-size="20" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">调用LLM</text>
  <text x="1118" y="650" fill="#1F2933" font-size="18" font-family="Segoe UI, Microsoft YaHei, sans-serif">函数按钮可点击跳转源码</text>
</svg>
