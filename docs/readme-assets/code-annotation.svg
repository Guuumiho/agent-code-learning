  <text x="844" y="890" fill="#27A3FF" font-size="34" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-weight="700">关键代码标出，速通核心机制</text>

  <text x="70" y="86" fill="#1F2933" font-size="28" font-family="Cascadia Code, Consolas, monospace">class ContextBuilder:</text>
  <text x="108" y="134" fill="#1F2933" font-size="28" font-family="Cascadia Code, Consolas, monospace">def build_messages(...):</text>
  <text x="108" y="192" fill="#1F2933" font-size="24" font-family="Cascadia Code, Consolas, monospace">runtime_ctx = self._build_runtime_context(...)</text>
  <text x="108" y="264" fill="#1F2933" font-size="24" font-family="Cascadia Code, Consolas, monospace">user_content = self._build_user_content(...)</text>
  <text x="108" y="340" fill="#1F2933" font-size="24" font-family="Cascadia Code, Consolas, monospace">merged = f&quot;{runtime_ctx}\\n\\n{user_content}&quot;</text>
  <text x="108" y="430" fill="#1F2933" font-size="24" font-family="Cascadia Code, Consolas, monospace">messages = [system prompt, *history]</text>
  <text x="108" y="514" fill="#1F2933" font-size="24" font-family="Cascadia Code, Consolas, monospace">messages.append({&quot;role&quot;: current_role, ...})</text>

  <rect x="58" y="160" width="744" height="74" rx="10" fill="none" stroke="#D89B18" stroke-width="3" stroke-dasharray="10 8"/>
  <rect x="58" y="236" width="744" height="74" rx="10" fill="none" stroke="#D89B18" stroke-width="3" stroke-dasharray="10 8"/>
  <rect x="58" y="312" width="744" height="98" rx="10" fill="none" stroke="#D89B18" stroke-width="3" stroke-dasharray="10 8"/>
  <rect x="58" y="404" width="744" height="142" rx="10" fill="none" stroke="#D89B18" stroke-width="3" stroke-dasharray="10 8"/>

  <text x="70" y="154" fill="#7A4F00" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif">构建运行时上下文</text>
  <text x="70" y="230" fill="#7A4F00" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif">构建用户内容</text>
  <text x="70" y="306" fill="#7A4F00" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif">合并运行时上下文和用户内容</text>
  <text x="70" y="398" fill="#7A4F00" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif">组装 messages 列表</text>

