  <text x="836" y="332" fill="#1F2933" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif">将system prompt、历史消息、当前用户消息</text>
  <text x="836" y="366" fill="#1F2933" font-size="22" font-family="Segoe UI, Microsoft YaHei, sans-serif">组合成LLM需要的messages列表。</text>
